name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject tokens
        if: github.event.action != 'closed'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          sed -i "s/__APIFY_TOKEN__/${APIFY_TOKEN}/g" map.js 19hz/map.js
          sed -i "s/__GOOGLE_TOKEN__/${GOOGLE_TOKEN}/g" index.html
          sed -i "s/__SPOTIFY_CLIENT_ID__/${SPOTIFY_CLIENT_ID}/g" 19hz/map.js
          sed -i "s/__SPOTIFY_CLIENT_SECRET__/${SPOTIFY_CLIENT_SECRET}/g" 19hz/map.js

      - name: Stage preview files
        id: stage
        run: |
          if [ "${{ github.event.action }}" != "closed" ]; then
            mkdir -p /tmp/preview/19hz
            cp index.html map.js categories.json style.css /tmp/preview/
            cp 19hz/index.html 19hz/map.js 19hz/venues.json /tmp/preview/19hz/
            echo "source-dir=/tmp/preview" >> $GITHUB_OUTPUT
          else
            echo "source-dir=." >> $GITHUB_OUTPUT
          fi

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ${{ steps.stage.outputs.source-dir }}
          preview-branch: gh-pages
          umbrella-dir: pr-preview

      - name: Trigger Pages deploy
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref gh-pages --repo ${{ github.repository }}
