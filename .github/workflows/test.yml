name: Test
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: Inject tokens
              env:
                APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
                GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
                SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
                SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
              run: |
                sed -i "s/__APIFY_TOKEN__/${APIFY_TOKEN}/g" map.js 19hz/map.js
                sed -i "s/__GOOGLE_TOKEN__/${GOOGLE_TOKEN}/g" index.html
                sed -i "s/__SPOTIFY_CLIENT_ID__/${SPOTIFY_CLIENT_ID}/g" 19hz/map.js
                sed -i "s/__SPOTIFY_CLIENT_SECRET__/${SPOTIFY_CLIENT_SECRET}/g" 19hz/map.js
            - name: Serve site
              run: python3 -m http.server 8000 &
            - name: Wait for server
              run: sleep 2
            - name: Install Playwright
              run: npx playwright@latest install chromium --with-deps
            - name: Check for JavaScript errors
              run: npx playwright@latest test
