<!DOCTYPE html>
<html>
<head>
    <title>Date Parsing Test</title>
</head>
<body>
    <h1>Date Parsing Test</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        // Helper function from the fixed code
        function parseTime12Hour(timeStr) {
            const trimmed = timeStr.trim().toLowerCase();
            const isPM = trimmed.includes('pm');
            const isAM = trimmed.includes('am');
            
            // Remove am/pm and any spaces
            const timeOnly = trimmed.replace(/am|pm/gi, '').trim();
            
            // Split hours and minutes
            const parts = timeOnly.split(':');
            let hours = parseInt(parts[0]);
            const minutes = parts[1] ? parseInt(parts[1]) : 0;
            
            // Convert to 24-hour format
            if (isPM && hours !== 12) {
                hours += 12;
            } else if (isAM && hours === 12) {
                hours = 0;
            }
            
            return { hours, minutes };
        }
        
        // Test data from the CSV
        const testEvents = [
            { date: '2026-01-27', time: '9:30pm-2am', desc: 'Overnight event' },
            { date: '2026-01-28', time: '8pm', desc: 'No end time' },
            { date: '2026-01-29', time: '10pm-2am', desc: 'Overnight event' },
            { date: '2026-01-29', time: '9pm-1:30am', desc: 'Overnight event with minutes' }
        ];
        
        testEvents.forEach((testEvent, index) => {
            output.innerHTML += `<h2>Test ${index + 1}: ${testEvent.desc} (${testEvent.time})</h2>`;
            try {
                const time = testEvent.time.split('-');
                
                // Parse start time properly
                const startTime = parseTime12Hour(time[0]);
                const start = new Date(testEvent.date);
                start.setHours(startTime.hours, startTime.minutes, 0, 0);
                const startDate = start.toLocaleDateString('sv-SE');
                
                let end;
                if (time[1]) {
                    const endTime = parseTime12Hour(time[1]);
                    end = new Date(testEvent.date);
                    end.setHours(endTime.hours, endTime.minutes, 0, 0);
                    
                    // Is event overnight? (end time is earlier than start time)
                    if (end <= start) {
                        end.setDate(end.getDate() + 1);
                    }
                } else { 
                    // default 1 hour duration
                    end = new Date(start.getTime() + 60*60*1000);
                }
                
                output.innerHTML += `<p>Start Date: ${startDate}</p>`;
                output.innerHTML += `<p>Start Time: ${start.toTimeString().substr(0,5)}</p>`;
                output.innerHTML += `<p>End Date: ${end.toLocaleDateString('sv-SE')}</p>`;
                output.innerHTML += `<p>End Time: ${end.toTimeString().substr(0,5)}</p>`;
                
                const isValid = start.toString() !== 'Invalid Date' && end.toString() !== 'Invalid Date';
                output.innerHTML += `<p style="color: ${isValid ? 'green' : 'red'}; font-weight: bold">Valid: ${isValid}</p>`;
                
                // Show what the calendar button would receive
                output.innerHTML += `<p style="background: #f0f0f0; padding: 10px; margin: 10px 0;">`;
                output.innerHTML += `Calendar Button Attributes:<br>`;
                output.innerHTML += `startDate="${startDate}"<br>`;
                output.innerHTML += `startTime="${start.toTimeString().substr(0,5)}"<br>`;
                output.innerHTML += `endDate="${end.toLocaleDateString('sv-SE')}"<br>`;
                output.innerHTML += `endTime="${end.toTimeString().substr(0,5)}"`;
                output.innerHTML += `</p>`;
                
            } catch (e) {
                output.innerHTML += `<p style="color: red">Error: ${e.message}</p>`;
            }
        });
    </script>
</body>
</html>
