<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>19hz Mapper</title>
    <meta name="description"
        content="The Unofficial Map of 19hz Events Updated Daily! Pick a day and a tag to plan activities or just clear the filters and browse through all the most popular events the Bay Area has to offer. Free. Open Source. No registration necessary. Works with Mobile and Tablets as well as Computers!" />
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="../favicon_fc.ico" />
    <link rel="shortcut icon" href="../favicon_fc.ico" />
</head>

<body>
    <div id="map-canvas"></div>

    <a id="feedback" class="ui-button" target="_blank" href="https://github.com/ProLoser/funcheapmap/issues">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z">
            </path>
            <path d="M11 5h2v6h-2zm0 8h2v2h-2z"></path>
        </svg>
        Feedback
    </a>

    <form id="controls" onreset="filter({ date: '', tag: '' })">
        <details open>
            <summary>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="filter-icon">
                    <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" />
                </svg>
                Showing <output name="countEvents" for="date">0</output> Events
            </summary>
            <p>
                <label for="date">Date:</label>
                <input id="date" name="date" type="date" onchange="filter({ date: this.value })">
                <button type="reset">Clear</button>
            </p>
            <p>
                <label for="tag">Tags: <output name="countTags" for="tag">All</output></label>
            </p>
            <p>
                <select id="tag" name="tag" multiple
                    onchange="filter({ tag: Array.from(this.selectedOptions).map(o => o.value).join('~') })">
                    <!-- These are programmatically replaced after data loads -->
                </select>
            </p>
        </details>
    </form>
    <script async defer src="https://cdn.jsdelivr.net/npm/add-to-calendar-button@2"></script>
    <script src="map.js"></script>
    <script async
        src="https://maps.googleapis.com/maps/api/js?v=3.exp&loading=async&key=__GOOGLE_TOKEN__&libraries=marker&callback=initialize"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0NECRETGYD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-0NECRETGYD');
    </script>
</body>

</html>
